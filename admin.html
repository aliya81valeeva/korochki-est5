<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #fce4ec; }
        .navbar { background-color: #f8bbd0 !important; border-bottom: 2px solid #f48fb1; }
        .navbar-brand { color: #880e4f !important; }
        .nav-link { color: #880e4f !important; }
        .nav-link:hover { color: #4a0a2a !important; }
        .nav-link.active { color: #880e4f !important; font-weight: bold; }
        .card { border-color: #f48fb1; }
        .btn-primary {
            background-color: #ec407a;
            border-color: #d81b60;
        }
        .btn-primary:hover {
            background-color: #d81b60;
            border-color: #c2185b;
        }
        .btn-success {
            background-color: #ec407a;
            border-color: #d81b60;
        }
        .btn-success:hover {
            background-color: #d81b60;
            border-color: #c2185b;
        }
        .btn-secondary {
            background-color: #f48fb1;
            border-color: #ec407a;
            color: #880e4f;
        }
        .btn-secondary:hover {
            background-color: #ec407a;
            border-color: #d81b60;
            color: white;
        }
        a { color: #d81b60; }
        a:hover { color: #880e4f; }
        .text-muted { color: #ad1457 !important; }
        .bg-light { background-color: #fce4ec !important; }
        .table { border-color: #f48fb1; }
        .table-light { background-color: #f8bbd0 !important; }
        .badge.bg-primary { background-color: #ec407a !important; }
        .badge.bg-warning { background-color: #f48fb1 !important; color: #4a0a2a; }
        .badge.bg-success { background-color: #ad1457 !important; }
        .text-danger { color: #c2185b !important; }
        h4 { color: #880e4f; }
        strong { color: #880e4f; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Корочки.есть</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="admin.html">Админ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h4 class="mb-3">Админ панель</h4>

        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="mb-3">Все заявки пользователей</h4>

                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead class="table-light">
                            <tr>
                                <th>Курс</th>
                                <th>Дата начала</th>
                                <th>Оплата</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>Python для анализа данных</strong></td>
                                <td>15.07.2026</td>
                                <td>Наличные</td>
                                <td><span class="badge bg-primary" id="status1">Новая</span></td>
                                <td>
                                    <button class="btn btn-sm btn-success" onclick="changeStatus('status1', 'Идёт обучение', 'bg-warning')">В обучение</button>
                                    <button class="btn btn-sm btn-secondary" onclick="changeStatus('status1', 'Обучение завершено', 'bg-success')">Завершить</button>
                                </td>
                            </tr>
                            <tr>
                                <td><strong>Управление проектами</strong></td>
                                <td>01.08.2026</td>
                                <td>Перевод по телефону</td>
                                <td><span class="badge bg-warning" id="status2">Идёт обучение</span></td>
                                <td>
                                    <button class="btn btn-sm btn-success" onclick="changeStatus('status2', 'Идёт обучение', 'bg-warning')">В обучение</button>
                                    <button class="btn btn-sm btn-secondary" onclick="changeStatus('status2', 'Обучение завершено', 'bg-success')">Завершить</button>
                                </td>
                            </tr>
                            <tr>
                                <td><strong>Основы бухгалтерии</strong></td>
                                <td>10.05.2026</td>
                                <td>Наличные</td>
                                <td><span class="badge bg-success" id="status3">Обучение завершено</span></td>
                                <td>
                                    <button class="btn btn-sm btn-success" onclick="changeStatus('status3', 'Идёт обучение', 'bg-warning')">В обучение</button>
                                    <button class="btn btn-sm btn-secondary" onclick="changeStatus('status3', 'Обучение завершено', 'bg-success')">Завершить</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function changeStatus(elementId, text, className) {
            const badge = document.getElementById(elementId);
            badge.textContent = text;
            badge.className = 'badge ' + className;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
