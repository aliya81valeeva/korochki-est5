<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая заявка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #fce4ec; }
        .navbar { background-color: #f8bbd0 !important; border-bottom: 2px solid #f48fb1; }
        .navbar-brand { color: #880e4f !important; }
        .nav-link { color: #880e4f !important; }
        .nav-link:hover { color: #4a0a2a !important; }
        .nav-link.active { color: #880e4f !important; font-weight: bold; }
        .card { border-color: #f48fb1; }
        .btn-primary {
            background-color: #ec407a;
            border-color: #d81b60;
        }
        .btn-primary:hover {
            background-color: #d81b60;
            border-color: #c2185b;
        }
        a { color: #d81b60; }
        a:hover { color: #880e4f; }
        .form-control:focus {
            border-color: #ec407a;
            box-shadow: 0 0 0 0.2rem rgba(236, 64, 122, 0.25);
        }
        .text-muted { color: #ad1457 !important; }
        .bg-light { background-color: #fce4ec !important; }
        .text-danger { color: #c2185b !important; }
        .form-check-input:checked {
            background-color: #ec407a;
            border-color: #d81b60;
        }
        h4 { color: #880e4f; }
        label { color: #880e4f; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Корочки.есть</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="login.html">Вход</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Регистрация</a></li>
                    <li class="nav-item"><a class="nav-link" href="applications.html">Мои заявки</a></li>
                    <li class="nav-item"><a class="nav-link active" href="new-application.html">Оформить заявку</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="mb-3">Формирование заявки</h4>
                        <form id="newAppForm">
                            <div class="mb-3">
                                <label class="form-label">Наименование курса <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" placeholder="Введите название курса" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Желаемая дата начала обучения <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Способ оплаты <span class="text-danger">*</span></label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="payment" id="cash" value="cash" checked>
                                    <label class="form-check-label" for="cash">Наличными</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="payment" id="transfer" value="transfer">
                                    <label class="form-check-label" for="transfer">Перевод по номеру телефона</label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary">Отправить</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('newAppForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Заявка отправлена!');
            window.location.href = 'applications.html';
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
