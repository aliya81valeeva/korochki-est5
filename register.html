<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fce4ec; }
        .card { border-color: #f48fb1; }
        .btn-primary {
            background-color: #ec407a;
            border-color: #d81b60;
        }
        .btn-primary:hover {
            background-color: #d81b60;
            border-color: #c2185b;
        }
        a { color: #d81b60; }
        a:hover { color: #880e4f; }
        .form-control:focus {
            border-color: #ec407a;
            box-shadow: 0 0 0 0.2rem rgba(236, 64, 122, 0.25);
        }
        .text-muted { color: #ad1457 !important; }
        .bg-light { background-color: #fce4ec !important; }
        .text-danger { color: #c2185b !important; }
        .invalid-feedback { color: #c2185b; }
        h3 { color: #880e4f; }
        label { color: #880e4f; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-3">Регистрация</h3>

                        <form id="registerForm" novalidate>
                            <div class="mb-3">
                                <label class="form-label">Логин <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="regLogin" placeholder="Латиница и цифры, минимум 6" pattern="[A-Za-z0-9]{6,}" required>
                                <div class="invalid-feedback">Логин: латиница и цифры, не менее 6 символов</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Пароль <span class="text-danger">*</span></label>
                                <input type="password" class="form-control" id="regPassword" placeholder="Минимум 8 символов" minlength="8" required>
                                <div class="invalid-feedback">Пароль должен быть не менее 8 символов</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">ФИО <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="regFullname" placeholder="Валеева Алия Зиннуровна" pattern="[А-Яа-я\s]{2,}" required>
                                <div class="invalid-feedback">Введите ФИО кириллицей</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Телефон <span class="text-danger">*</span></label>
                                <input type="tel" class="form-control" id="regPhone" placeholder="8(XXX)XXX-XX-XX" pattern="8\(\d{3}\)\d{3}-\d{2}-\d{2}" required>
                                <div class="invalid-feedback">Формат: 8(XXX)XXX-XX-XX</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" id="regEmail" placeholder="example@mail.ru" required>
                                <div class="invalid-feedback">Введите корректный email</div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
                        </form>

                        <div class="text-center mt-3">
                            <a href="login.html">Войти</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const form = this;
            if (!form.checkValidity()) {
                e.stopPropagation();
                form.classList.add('was-validated');
                return;
            }
            alert('Регистрация успешна!');
            window.location.href = 'login.html';
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
