<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fce4ec; }
        .card { border-color: #f48fb1; }
        .btn-primary {
            background-color: #ec407a;
            border-color: #d81b60;
        }
        .btn-primary:hover {
            background-color: #d81b60;
            border-color: #c2185b;
        }
        a { color: #d81b60; }
        a:hover { color: #880e4f; }
        .form-control:focus {
            border-color: #ec407a;
            box-shadow: 0 0 0 0.2rem rgba(236, 64, 122, 0.25);
        }
        .alert-danger {
            background-color: #f8bbd0;
            border-color: #f48fb1;
            color: #880e4f;
        }
        .text-muted { color: #ad1457 !important; }
        .bg-light { background-color: #fce4ec !important; }
        h3 { color: #880e4f; }
        label { color: #880e4f; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-3">Корочки.есть</h3>

                        <div id="errorMsg" class="alert alert-danger d-none" role="alert">
                            Неверный логин или пароль
                        </div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Логин</label>
                                <input type="text" class="form-control" id="loginInput" placeholder="Введите логин">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="passwordInput" placeholder="Введите пароль">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Войти</button>
                        </form>

                        <div class="text-center mt-3">
                            <a href="register.html">Ещё не зарегистрированы? Регистрация</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const login = document.getElementById('loginInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const errorDiv = document.getElementById('errorMsg');

            if (login === 'Admin' && password === 'KorokNET') {
                window.location.href = 'admin.html';
            } else if (login === 'user123' && password === '12345678') {
                window.location.href = 'applications.html';
            } else {
                errorDiv.classList.remove('d-none');
                setTimeout(() => errorDiv.classList.add('d-none'), 3000);
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
